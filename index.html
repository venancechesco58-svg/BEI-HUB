<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeiHub - Phone Price Comparison & Reviews</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- HEADER / NAVBAR -->
  <header class="header">
    <div class="header-container">
      <div class="logo-section">
        <a href="index.html" class="logo">
          <span class="logo-bei">Bei</span><span class="logo-hub">Hub</span>
        </a>
      </div>

      <!-- Hamburger Menu (Mobile) -->
      <button class="hamburger" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Navigation Menu -->
      <nav class="nav-menu" id="navMenu">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="#" class="nav-link">Phone List</a>
        <a href="#" class="nav-link">Trending</a>
        <a href="#" class="nav-link">Articles</a>
      </nav>

      <!-- Header Icons -->
      <div class="header-icons">
        <button class="icon-btn" title="User Profile">👤</button>
        <button class="icon-btn" title="Menu">☰</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- SEARCH BAR SECTION -->
    <section class="search-section">
      <div class="search-container">
        <input
          type="text"
          class="search-input"
          placeholder="Search for a phone or price..."
          id="searchInput"
        />
        <button class="search-btn">🔍</button>
      </div>
    </section>

    <!-- TRENDING PHONES SECTION -->
    <section class="trending-section">
      <h2 class="section-title">Trending Phones</h2>
      <div class="phones-grid" id="trendingPhones">
        <!-- Cards will be generated by JavaScript -->
      </div>
    </section>

    <!-- CATEGORY BUTTONS SECTION -->
    <section class="categories-section">
      <button class="category-btn category-blue">
        <span class="category-icon">📱</span>
        <span>Phones under 500K</span>
      </button>
      <button class="category-btn category-orange">
        <span class="category-icon">📸</span>
        <span>Camera Phones</span>
      </button>
      <button class="category-btn category-red">
        <span class="category-icon">🎮</span>
        <span>Gaming Phones</span>
      </button>
    </section>

    <!-- LATEST ARTICLES SECTION -->
    <section class="articles-section">
      <h2 class="section-title">Latest Articles</h2>
      <div class="articles-grid" id="latestArticles">
        <!-- Articles will be generated by JavaScript -->
      </div>
    </section>

    <!-- PHONE COMPARISON SECTION -->
    <section class="comparison-section">
      <h2 class="section-title">Compare Phones</h2>
      <div class="comparison-container">
        <div class="comparison-row">
          <select class="phone-select" id="phone1Select">
            <option value="">Select Phone 1</option>
          </select>
          <span class="vs-text">VS</span>
          <select class="phone-select" id="phone2Select">
            <option value="">Select Phone 2</option>
          </select>
        </div>
        <button class="compare-btn" id="compareBtn">COMPARE</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 BeiHub. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
